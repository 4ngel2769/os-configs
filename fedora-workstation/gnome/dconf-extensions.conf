# os-configs — dconf dump: /org/gnome/shell/extensions/
# Load with: dconf load /org/gnome/shell/extensions/ < dconf-extensions.conf

# ── Dash to Dock ─────────────────────────────────────────────
[dash-to-dock]
dock-position='BOTTOM'
dash-max-icon-size=48
transparency-mode='DYNAMIC'
background-opacity=0.6
running-indicator-style='DOTS'
show-trash=false
show-mounts=false
hot-keys=true
click-action='minimize-or-previews'
scroll-action='switch-workspace'
animate-show-apps=true
custom-theme-shrink=true
disable-overview-on-startup=true
intellihide-mode='ALL_WINDOWS'
multi-monitor=true

# ── Blur My Shell ────────────────────────────────────────────
[blur-my-shell]
sigma=30
brightness=0.75
color=(0.0, 0.0, 0.0, 0.0)
noise-amount=0.0
noise-lightness=0.0
color-and-noise=false
hacks-level=1

[blur-my-shell/overview]
blur=true
pipeline='pipeline_default'

[blur-my-shell/panel]
blur=true
brightness=0.6
sigma=30
pipeline='pipeline_default'

[blur-my-shell/dash-to-dock]
blur=true
brightness=0.6
sigma=30
pipeline='pipeline_default'
override-background=true
style-dash-to-dock=0
unblur-in-overview=false

[blur-my-shell/appfolder]
blur=true
brightness=0.6
sigma=30

[blur-my-shell/lockscreen]
blur=true
pipeline='pipeline_default'

# ── Tiling Shell ─────────────────────────────────────────────
[tilingshell]
enable-tiling-system=true
enable-snap-assist=true
inner-gaps=8
outer-gaps=8
snap-assist-threshold=0.3

# ── Caffeine ─────────────────────────────────────────────────
[caffeine]
enable-fullscreen=true
show-indicator='always'
show-notifications=true
user-enabled=false

# ── Just Perfection ──────────────────────────────────────────
[just-perfection-desktop]
activities-button=true
app-menu=false
clock-menu-position=1
notification-banner-position=2
panel-in-overview=true
ripple-box=false
search=true
show-apps-button=true
startup-status=0
theme=false
window-demands-attention-focus=true
workspace-popup=true
workspace-wrap-around=true
animation=2
panel-button-padding-size=5

# ── Clipboard Indicator ─────────────────────────────────────
[clipboard-indicator]
history-size=50
display-mode=0
disable-down-arrow=true
enable-keybindings=true
move-item-first=true
strip-text=false

# ── Color Picker ─────────────────────────────────────────────
[color-picker]
enable-shortcut=true
enable-systray=true
color-picker-shortcut=['<Super>c']

# ── Advanced Alt-Tab ─────────────────────────────────────────
[advanced-alt-tab]
super-key-mode=2
hot-edge-position=0
app-switcher-popup-fav-apps=false

# ── PiP on Top ───────────────────────────────────────────────
[pip-on-top]
stick=true

# ── Advanced Media Controller ────────────────────────────────
[advanced-media-controller]
show-player-icon=true
show-text=true
colored-player-icon=true

# ── App Grid Tuner ───────────────────────────────────────────
[app-grid-tuner]
columns=6
rows=4
