# os-configs — dconf dump: /org/gnome/desktop/background/
# Load with: sed "s|/home/user|$HOME|g" dconf-background.conf | dconf load /org/gnome/desktop/background/
#
# NOTE: The bootstrap script substitutes /home/user with the actual $HOME path
# before loading this file. Do not change the /home/user placeholder manually.

[/]
picture-uri='file:///home/user/.local/share/wallpapers/wallpaper.jpg'
picture-uri-dark='file:///home/user/.local/share/wallpapers/wallpaper.jpg'
picture-options='zoom'
primary-color='#000000'
secondary-color='#000000'
color-shading-type='solid'
