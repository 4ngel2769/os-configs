# os-configs — dconf dump: /org/gnome/desktop/wm/keybindings/
# Load with: dconf load /org/gnome/desktop/wm/keybindings/ < dconf-keybindings.conf
#
# Also contains settings for /org/gnome/settings-daemon/plugins/media-keys/
# which must be loaded separately (the bootstrap handles this).

[/]
# Window management
close=['<Super>q']
minimize=['<Super>h']
maximize=['<Super>Up']
unmaximize=['<Super>Down']
toggle-fullscreen=['<Super>F11']

# Switch windows (not applications) with Alt+Tab
switch-windows=['<Alt>Tab']
switch-windows-backward=['<Shift><Alt>Tab']
switch-applications=@as []
switch-applications-backward=@as []

# Workspace switching
switch-to-workspace-left=['<Control><Super>Left']
switch-to-workspace-right=['<Control><Super>Right']
move-to-workspace-left=['<Shift><Control><Super>Left']
move-to-workspace-right=['<Shift><Control><Super>Right']

# Move window to monitor
move-to-monitor-left=['<Super><Shift>Left']
move-to-monitor-right=['<Super><Shift>Right']

# Tiling (half-screen)
# Note: These may be handled by Tiling Shell extension instead

# Misc
toggle-above=['<Super>a']
begin-move=['<Super>F7']
begin-resize=['<Super>F8']
